version: '3.8'

services:
  # Redis for caching and pub/sub
  redis:
    image: redis:7-alpine
    container_name: ai-ngfw-redis
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5

  # Main application (backend + frontend)
  app:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: ai-ngfw-app
    ports:
      - "7860:7860"
    environment:
      - DATABASE_URL=sqlite:///./ai_ngfw.db
      - REDIS_URL=redis://redis:6379
      - DEBUG=false
      - GROQ_API_KEY=${GROQ_API_KEY}
      - HUGGINGFACE_API_TOKEN=${HUGGINGFACE_API_TOKEN}
    depends_on:
      redis:
        condition: service_healthy
    volumes:
      - ./backend:/app/backend
      - ./ai_ngfw.db:/app/ai_ngfw.db
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:7860/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 40s

volumes:
  redis_data:
