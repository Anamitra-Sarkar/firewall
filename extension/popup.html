<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AI-NGFW Threat Protection</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        :root {
            --primary: #0f172a;
            --primary-light: #1e293b;
            --accent-blue: #3b82f6;
            --accent-green: #10b981;
            --accent-red: #ef4444;
            --text-primary: #f1f5f9;
            --text-secondary: #94a3b8;
            --border-color: #334155;
        }

        body {
            width: 360px;
            background: var(--primary);
            color: var(--text-primary);
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
            line-height: 1.6;
        }

        .popup-container {
            padding: 16px;
            display: flex;
            flex-direction: column;
            gap: 16px;
        }

        .header {
            display: flex;
            align-items: center;
            justify-content: space-between;
            padding-bottom: 12px;
            border-bottom: 1px solid var(--border-color);
        }

        .logo {
            font-size: 18px;
            font-weight: 700;
            background: linear-gradient(135deg, var(--accent-blue), #06b6d4);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
        }

        .status-badge {
            padding: 4px 8px;
            border-radius: 4px;
            font-size: 12px;
            font-weight: 600;
            background: rgba(16, 185, 129, 0.2);
            color: var(--accent-green);
        }

        .status-badge.active {
            background: rgba(16, 185, 129, 0.2);
            color: var(--accent-green);
        }

        .status-badge.blocked {
            background: rgba(239, 68, 68, 0.2);
            color: var(--accent-red);
        }

        .threat-counter {
            background: rgba(15, 23, 42, 0.5);
            border: 1px solid var(--border-color);
            border-radius: 8px;
            padding: 16px;
            text-align: center;
        }

        .threat-count {
            font-size: 32px;
            font-weight: 700;
            color: var(--accent-blue);
            margin-bottom: 4px;
        }

        .threat-label {
            font-size: 12px;
            color: var(--text-secondary);
            text-transform: uppercase;
            letter-spacing: 0.5px;
        }

        .stats {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 8px;
        }

        .stat-item {
            background: rgba(15, 23, 42, 0.5);
            border: 1px solid var(--border-color);
            border-radius: 6px;
            padding: 12px;
            text-align: center;
        }

        .stat-value {
            font-size: 20px;
            font-weight: 600;
            color: var(--accent-blue);
            margin-bottom: 4px;
        }

        .stat-label {
            font-size: 11px;
            color: var(--text-secondary);
        }

        .threat-list {
            max-height: 200px;
            overflow-y: auto;
            border: 1px solid var(--border-color);
            border-radius: 6px;
            background: rgba(15, 23, 42, 0.3);
        }

        .threat-item {
            padding: 12px;
            border-bottom: 1px solid var(--border-color);
            font-size: 12px;
            display: flex;
            align-items: flex-start;
            gap: 8px;
        }

        .threat-item:last-child {
            border-bottom: none;
        }

        .threat-icon {
            font-size: 14px;
            flex-shrink: 0;
            margin-top: 2px;
        }

        .threat-details {
            flex: 1;
            min-width: 0;
        }

        .threat-domain {
            font-weight: 600;
            color: var(--text-primary);
            word-break: break-all;
        }

        .threat-reason {
            color: var(--text-secondary);
            margin-top: 2px;
        }

        .threat-time {
            color: var(--text-secondary);
            font-size: 10px;
            margin-top: 4px;
        }

        .empty-state {
            text-align: center;
            padding: 24px 12px;
            color: var(--text-secondary);
        }

        .empty-icon {
            font-size: 32px;
            margin-bottom: 8px;
        }

        .empty-text {
            font-size: 14px;
        }

        .actions {
            display: flex;
            gap: 8px;
        }

        .btn {
            flex: 1;
            padding: 10px;
            border: none;
            border-radius: 6px;
            font-weight: 600;
            font-size: 12px;
            cursor: pointer;
            transition: all 0.2s ease;
            text-transform: uppercase;
            letter-spacing: 0.5px;
        }

        .btn-primary {
            background: var(--accent-blue);
            color: white;
        }

        .btn-primary:hover {
            background: #2563eb;
            transform: translateY(-1px);
        }

        .btn-secondary {
            background: transparent;
            color: var(--text-secondary);
            border: 1px solid var(--border-color);
        }

        .btn-secondary:hover {
            background: rgba(59, 130, 246, 0.1);
            color: var(--accent-blue);
            border-color: var(--accent-blue);
        }

        .section-title {
            font-size: 12px;
            font-weight: 600;
            color: var(--text-secondary);
            text-transform: uppercase;
            letter-spacing: 0.5px;
            margin-bottom: 8px;
        }

        .settings-link {
            text-align: center;
            padding-top: 8px;
            border-top: 1px solid var(--border-color);
        }

        .settings-link a {
            color: var(--accent-blue);
            text-decoration: none;
            font-size: 12px;
            transition: color 0.2s ease;
        }

        .settings-link a:hover {
            color: #2563eb;
        }

        /* Scrollbar styling */
        .threat-list::-webkit-scrollbar {
            width: 6px;
        }

        .threat-list::-webkit-scrollbar-track {
            background: transparent;
        }

        .threat-list::-webkit-scrollbar-thumb {
            background: var(--border-color);
            border-radius: 3px;
        }

        .threat-list::-webkit-scrollbar-thumb:hover {
            background: var(--accent-blue);
        }
    </style>
</head>
<body>
    <div class="popup-container">
        <!-- Header -->
        <div class="header">
            <div class="logo">AI-NGFW</div>
            <div class="status-badge active">
                <span id="status">Active</span>
            </div>
        </div>

        <!-- Threat Counter -->
        <div class="threat-counter">
            <div class="threat-count" id="blockedCount">0</div>
            <div class="threat-label">Threats Blocked Today</div>
        </div>

        <!-- Stats Grid -->
        <div class="stats">
            <div class="stat-item">
                <div class="stat-value" id="totalRequests">0</div>
                <div class="stat-label">Requests Analyzed</div>
            </div>
            <div class="stat-item">
                <div class="stat-value" id="blockRate">0%</div>
                <div class="stat-label">Block Rate</div>
            </div>
        </div>

        <!-- Threats Section -->
        <div>
            <div class="section-title">Recent Threats</div>
            <div class="threat-list" id="threatList">
                <div class="empty-state">
                    <div class="empty-icon">✓</div>
                    <div class="empty-text">All clear! No threats detected.</div>
                </div>
            </div>
        </div>

        <!-- Actions -->
        <div class="actions">
            <button class="btn btn-secondary" id="resetBtn">Reset Stats</button>
            <button class="btn btn-primary" id="settingsBtn">Settings</button>
        </div>

        <!-- Settings Link -->
        <div class="settings-link">
            <a href="#" id="aboutLink">About & Docs</a>
        </div>
    </div>

    <script src="popup.js"></script>
</body>
</html>
